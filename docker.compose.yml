services:
  app:
    build: ./app
    container_name: node-app

    ports:
      - "3000:3000"

    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: postgres-db

    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: myapp

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
