services:
  web:
    image: nginx:alpine
    container_name: nginx-web

    ports:
      - "80:80"

    volumes:
      - ./html:/usr/share/nginx/html:ro

    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: postgres-db

    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: myapp

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
