name: DevOps CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependency
        run: |
          cd app
          npm install

      - name: Build Docker Image
        run: |
          docker build -t node-devops-app ./app
